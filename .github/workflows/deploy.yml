name: Deploy su GitHub Pages

on:
  # Deploy automatico ad ogni push sul branch main
  push:
    branches: [main]
  # Permette anche l'avvio manuale dalla scheda "Actions"
  workflow_dispatch:

# Permessi necessari al deploy su Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola esecuzione di deploy alla volta
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Carica artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
